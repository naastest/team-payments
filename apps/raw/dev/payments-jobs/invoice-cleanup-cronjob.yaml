apiVersion: batch/v1
kind: CronJob
metadata:
  name: invoice-cleanup
  namespace: payments-jobs
  labels:
    naas.io/team: payments
    naas.io/env: dev
spec:
  schedule: "0 2 * * *"   # daily at 02:00 UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: cleanup
              image: nginxinc/nginx-unprivileged:1.27.4
              command: ["/bin/sh", "-c", "echo 'invoice cleanup placeholder'"]
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
