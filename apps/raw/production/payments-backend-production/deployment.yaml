apiVersion: apps/v1
kind: Deployment
metadata:
  name: neon-billboard
  namespace: payments-backend-production
  labels:
    app.kubernetes.io/name: neon-billboard
    naas.io/team: payments
    naas.io/env: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: neon-billboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: neon-billboard
        naas.io/team: payments
        naas.io/env: production
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      containers:
        - name: neon-billboard
          # Pin to a specific SHA in production — update via PR after testing in acceptance.
          # Do not use :latest here.
          image: ghcr.io/naastest/neon-billboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: APP_ENV
              value: production
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
